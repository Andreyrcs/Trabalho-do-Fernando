<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AgendaPro</title>
    <link rel="stylesheet" href="./assents/css/Cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="register-header">
                <i class="fas fa-calendar-check"></i>
                <h1>Criar Conta</h1>
                <p>Preencha os dados para se cadastrar</p>
            </div>
            
            <form class="register-form" action='./Dashboard.html'>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Nome completo" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="E-mail" required>
                </div>
                
                <div class="input-row">
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Senha" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Confirmar senha" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-briefcase"></i>
                    <input type="text" placeholder="Empresa (opcional)">
                </div>
                
                <div class="terms">
                    <label>
                        <input type="checkbox" required> Li e aceito os <a href="#">Termos de Uso</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-register">Cadastrar</button>
            </form>
            
            <div class="login-link">
                <p>Já tem uma conta? <a href="index.html">Fazer login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
